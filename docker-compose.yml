version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: telegram_parser
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  parser:
    build: .
    depends_on:
      - postgres
    env_file: .env
    volumes:
      - .:/app
    command: python parser.py

volumes:
  postgres_data:
